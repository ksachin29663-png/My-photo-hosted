<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin Photo Host</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrAgR-3kY49awQF2CU3-TSIVHIuy5wl94",
            authDomain: "booke-app-b1bfa.firebaseapp.com",
            projectId: "booke-app-b1bfa",
            storageBucket: "booke-app-b1bfa.firebasestorage.app",
            messagingSenderId: "615828842414",
            appId: "1:615828842414:web:bd78e4562f3856eececa3f"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        window.uploadPhoto = async () => {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const linkBox = document.getElementById('linkBox');
            
            if (!file) return alert("फाइल चुनें!");
            linkBox.innerText = "अपलोडिंग...";

            try {
                const storageRef = ref(storage, 'photos/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                linkBox.innerHTML = "हो गया! लिंक कॉपी करें:<br><input type='text' value='" + url + "' readonly style='width:100%; margin-top:10px;'>";
            } catch (error) {
                linkBox.innerText = "Error: " + error.message;
                console.error(error);
            }
        };
    </script>

    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        button { background: #ff4081; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📷 फोटो होस्ट</h2>
        <input type="file" id="fileInput">
        <button onclick="uploadPhoto()">अपलोड करें</button>
        <div id="linkBox" style="margin-top:20px;"></div>
    </div>
</body>
</html>
