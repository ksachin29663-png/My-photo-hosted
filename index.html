<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Sachin Image Host</title>
    <!-- Firebase SDK v10.7.1 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // आपकी कॉन्फ़िगरेशन
        const firebaseConfig = {
            apiKey: "AIzaSyCrAgR-3KY49auQF2CU3-TS1MHZuySwI94",
            authDomain: "booke-app-b1bfa.firebaseapp.com",
            projectId: "booke-app-b1bfa",
            storageBucket: "booke-app-b1bfa.appspot.com",
            appId: "1:615828842414:web:bd78e4562f3856eececa3f"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        window.uploadImage = async () => {
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('result');
            const file = fileInput.files[0];

            if (!file) return alert("कृपया फोटो चुनें!");
            
            resultDiv.innerText = "अपलोड हो रहा है...";

            try {
                // फाइल का नाम बदलकर टाइमस्टैम्प लगा रहे हैं ताकि यूनिक रहे
                const fileName = 'photos/' + Date.now() + '_' + file.name;
                const storageRef = ref(storage, fileName);
                
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);
                
                resultDiv.innerHTML = `
                    <p style="color: lime;">फोटो अपलोड हो गई!</p>
                    <input type="text" value="${downloadURL}" readonly style="width:100%; padding:8px; border:none; border-radius:5px;">
                    <p><small>इस लिंक को कॉपी करें और कहीं भी उपयोग करें।</small></p>
                `;
            } catch (error) {
                resultDiv.innerText = "Error: " + error.message;
                console.error(error);
            }
        };
    </script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; }
        button { background: #38bdf8; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📷 खुद की होस्टिंग</h2>
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="uploadImage()">अपलोड और लिंक पाएं</button>
        <div id="result" style="margin-top:20px;"></div>
    </div>
</body>
</html>
