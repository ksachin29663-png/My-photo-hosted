<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sachin's Photo Host</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
    
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; }
        input[type="file"] { margin: 20px 0; color: #fff; }
        button { background: #03dac6; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #linkBox { margin-top: 20px; word-break: break-all; color: #03dac6; }
        input[type="text"] { width: 100%; margin-top: 10px; padding: 8px; background: #333; border: 1px solid #444; color: #fff; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 फोटो होस्टिंग</h2>
    <input type="file" id="fileInput">
    <button onclick="uploadPhoto()">अपलोड करें</button>
    <div id="linkBox"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCrAgR-3kY49awQF2CU3-TSIVHIuy5wl94",
        authDomain: "booke-app-b1bfa.firebaseapp.com",
        projectId: "booke-app-b1bfa",
        storageBucket: "booke-app-b1bfa.firebasestorage.app",
        messagingSenderId: "615828842414",
        appId: "1:615828842414:web:bd78e4562f3856eececa3f"
    };

    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    function uploadPhoto() {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return alert("पहले फाइल तो चुनो!");
        
        const linkBox = document.getElementById('linkBox');
        linkBox.innerText = "अपलोड हो रहा है...";

        const ref = storage.ref('photos/' + new Date().getTime() + "_" + file.name);
        
        ref.put(file).then(() => {
            ref.getDownloadURL().then(url => {
                linkBox.innerHTML = "लिंक मिल गई! (कॉपी करो): <br><input type='text' value='" + url + "' readonly>";
            });
        }).catch(err => {
            linkBox.innerText = "Error: " + err.message;
        });
    }
</script>
</body>
</html>
